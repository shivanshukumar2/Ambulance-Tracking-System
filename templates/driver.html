<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambulance Driver GPS</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
    padding:30px;
}
button{
    background:#d32f2f;
    color:white;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
#status{
    margin-top:20px;
    font-size:20px;
    color:green;
}
</style>

</head>
<body>

<h1>🚑 Ambulance Driver Panel</h1>

<button onclick="startTracking()">Start GPS</button>

<p id="status">Waiting...</p>

<script>

function startTracking(){

if(!navigator.geolocation){
document.getElementById("status").innerHTML="GPS is not supported.";
return;
}

navigator.geolocation.watchPosition(

function(position){

document.getElementById("status").innerHTML=
"Latitude: "+position.coords.latitude+
"<br>Longitude: "+position.coords.longitude;

fetch("/update_location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:position.coords.latitude,
longitude:position.coords.longitude,
speed:position.coords.speed || 0
})
});

},

function(error){

document.getElementById("status").innerHTML=
"GPS Error : "+error.message;

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}

</script>

</body>
</html>
